        .item {

            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        .item a {

        .item img {

        }
        .item .info {
            padding: 1rem;
            text-align: center;
        }
        .contact-info p {
            font-size: 1.2rem;
            margin: 1rem 0;
        }
        footer {

            color: white;
            text-align: center;
